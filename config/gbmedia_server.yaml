http:
  port: 8001
  # [可选] HTTPS配置， 默认不开启
  #ssl:
  #  # [可选] 是否开启HTTPS访问
  #  enabled: false
  #  # [可选] 证书文件路径，放置在resource/目录下即可，修改xxx为文件名
  #  key-store: classpath:test.monitor.89iot.cn.jks
  #  # [可选] 证书密码
  #  key-store-password: gpf64qmw
  #  # [可选] 证书类型， 默认为jks，根据实际修改
  #  key-store-type: JKS
    

rtc:

    ips:
        -  192.168.9.174

    udp:
        port: 10001
    tcp:
        port: 20001
     
    cert: fullchain.pem
    key:  privkey.pem
    timeout_ms: 15000

    # [可选] RtcConsumer 出站 RTP 丢包模拟（仅测试 NACK/RTX，生产务必保持 enabled: false）
    # 详见 GBServer/GbMediaServer/docs/rtc_consumer_outbound_loss_test.md
    #consumer_outbound_loss_test:
    #  enabled: false
    #  mode: bernoulli          # bernoulli | burst
    #  loss_percent: 5          # Bernoulli：0-100
    #  burst:
    #    enter_probability: 0.002
    #    loss_percent: 40
    #    leave_probability: 0.15
 
  consumer_outbound_loss_test:
    enabled: true
    mode: burst    # 或 burst
    loss_percent: 5
    burst:
      enter_probability: 0.002 # 每包进入突发段概率 0-1
      loss_percent: 40 # 突发段内丢包率 0-100
      leave_probability: 0.15 # 每包离开突发段概率 0-1

rtp:
    
    tcp:
        min_port: 20000
        max_port: 30000
    udp:
        min_port: 20000
        max_port: 30000
 
websocket:
    enabled: true
    ip: 0.0.0.0
    port: 9998
    push_interval: 1000
    max_connections: 100
    ping_interval: 30000
    ping_timeout: 10000